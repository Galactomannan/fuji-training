/* =========================================================================
   16. SPEED SESSIONS VIEW
   ========================================================================= */
function renderSpeed(){
  const log=Store.get(STORAGE.sessions,{});
  const filter=State.speedFilter||"all";
  const speeds=[];
  for(let w=1;w<=32;w++){
    for(let d=0;d<7;d++){
      const s=PLAN[w-1].days[d];
      if(s.type==="speed"||s.type==="hill"){
        const date=fmtISO(dateForWeekDay(w,d));
        const lg=log[date];
        speeds.push({w,d,date,session:s,phase:phaseForWeek(w),lg:lg||null});
      }
    }
  }
  const filtered=speeds.filter(s=>filter==="all"||s.phase.short===filter);
  // Use filtered set for both Planned and Completed so the filter chips stay coherent.
  const planned=filtered.length;
  const completed=filtered.filter(s=>s.lg&&(s.lg.status==="done"||s.lg.status==="modified")).length;
  const inZone=filtered.filter(s=>{
    if(!s.lg||!s.lg.avgHR)return false;
    const hr=parseInt(s.lg.avgHR);
    if(s.session.zone==="z2")return hr>=155&&hr<=171;
    if(s.session.zone==="z3")return hr>=172;
    return true;
  }).length;
  const zonePct=completed?Math.round(inZone/completed*100):0;
  const completedPct=planned?Math.round(completed/planned*100):0;

  document.getElementById("view-speed").innerHTML=`
    <div class="view-head">
      <div><div class="view-title">Speed Sessions</div><div class="view-sub">All quality workouts across the 32-week plan</div></div>
    </div>
    <div class="grid grid-3 mb-16">
      <div class="metric card"><div class="metric-label">Planned</div><div class="metric-value">${planned}</div></div>
      <div class="metric card"><div class="metric-label">Completed</div><div class="metric-value">${completed}</div><div class="metric-sub">${completedPct}%</div></div>
      <div class="metric card"><div class="metric-label">In correct HR zone</div><div class="metric-value">${zonePct}%</div><div class="metric-sub">of completed sessions</div></div>
    </div>
    <div class="row mb-16">
      <span class="card-h" style="margin:0">Filter:</span>
      <div class="seg" id="speed-filter" style="max-width:400px">
        <button data-v="all" class="${filter==="all"?"active":""}">All</button>
        <button data-v="Base" class="${filter==="Base"?"active":""}">Base</button>
        <button data-v="Build" class="${filter==="Build"?"active":""}">Build</button>
        <button data-v="Spec" class="${filter==="Spec"?"active":""}">Race-Spec</button>
        <button data-v="Taper" class="${filter==="Taper"?"active":""}">Taper</button>
      </div>
    </div>
    <div class="tbl-wrap">
      <table class="tbl">
        <thead><tr><th>Wk</th><th>Date</th><th>Phase</th><th>Session</th><th>HR target</th><th>Logged</th><th>Status</th><th></th></tr></thead>
        <tbody>${filtered.map(s=>{
          const lg=s.lg||{};
          const status=lg.status||"";
          return `<tr data-w="${s.w}" data-d="${s.d}" data-date="${s.date}">
            <td><b>W${s.w}</b></td>
            <td>${fmtShort(parseISO(s.date))}</td>
            <td><span class="chip" style="background:${s.phase.color}33;color:${s.phase.color};font-size:10px;padding:2px 8px">${s.phase.short}</span></td>
            <td><b>${s.session.title}</b><div class="small muted">${s.session.detail}</div></td>
            <td>${s.session.hrTarget}</td>
            <td>${lg.avgHR||lg.pace||lg.actualDuration?`${lg.actualDuration?lg.actualDuration+"min":""}${lg.pace?` · ${lg.pace}/km`:""}${lg.avgHR?` · HR ${lg.avgHR}`:""}${lg.rpe?` · RPE ${lg.rpe}`:""}`:"—"}</td>
            <td>${status?`<span class="status-${status}">${status}</span>`:'<span class="muted">—</span>'}</td>
            <td><button class="icon-btn edit-speed" aria-label="Edit ${escapeHtml(s.session.title)}">${iconEdit()}</button></td>
          </tr>`;
        }).join("")}</tbody>
      </table>
    </div>
  `;
  document.querySelectorAll("#speed-filter button").forEach(b=>b.addEventListener("click",()=>{State.speedFilter=b.dataset.v;renderSpeed();}));
  document.querySelectorAll(".edit-speed").forEach(b=>b.addEventListener("click",e=>{
    const tr=e.target.closest("tr");
    openSessionModal(parseInt(tr.dataset.w),parseInt(tr.dataset.d),tr.dataset.date);
  }));
}

  // Wire up handlers
  let st={soreness:todayR.soreness||0,energy:todayR.energy||0};
  document.querySelectorAll("#b-sore .star").forEach(b=>b.addEventListener("click",()=>{st.soreness=parseInt(b.dataset.v);document.querySelectorAll("#b-sore .star").forEach(x=>x.classList.toggle("on",parseInt(x.dataset.v)<=st.soreness));}));
  document.querySelectorAll("#b-energy .star").forEach(b=>b.addEventListener("click",()=>{st.energy=parseInt(b.dataset.v);document.querySelectorAll("#b-energy .star").forEach(x=>x.classList.toggle("on",parseInt(x.dataset.v)<=st.energy));}));

      weight:document.getElementById("b-weight").value||null,
      rhr:document.getElementById("b-rhr").value||null,
      hrv:document.getElementById("b-hrv").value||null,
      sleep:document.getElementById("b-sleep").value||null,
      soreness:st.soreness,
      energy:st.energy,
      notes:document.getElementById("b-notes").value||"",
      ts:Date.now()
    };
    Store.set(STORAGE.readiness,all);
    flash("Biometrics saved");
    renderBiometrics();

  document.getElementById("btn-target-save").addEventListener("click",()=>{

    renderBiometrics();

  // Sweat rate calculator wiring

  if(swCalc){

      const pre=parseFloat(document.getElementById("sw-pre").value);
      const post=parseFloat(document.getElementById("sw-post").value);
      const fluid=parseFloat(document.getElementById("sw-fluid").value)||0;
      const dur=parseFloat(document.getElementById("sw-dur").value);
      const temp=document.getElementById("sw-temp").value;
      const result=document.getElementById("sw-result");
      if(!pre||!post||!dur||pre<=post){
        result.innerHTML=`<div class="warn-box small">Need: pre weight, post weight (less than pre), and duration.</div>`;
        return;
      }
      // sweat loss (L) = (pre - post) + fluid intake (L)
      const lossKg=pre-post;
      const sweatL=lossKg+(fluid/1000);
      const sweatPerHr=sweatL/(dur/60);
      const dehydPct=(lossKg/pre)*100;
      // recommended fluid replacement during exercise: 80% of sweat rate (don't fully match, allow some loss)
      // post-exercise replacement: 150% of net loss (Sawka 2007)
      const recDuringHr=sweatPerHr*0.8*1000; // ml/hr

      settings.sweatRateHistory=settings.sweatRateHistory||[];
      settings.sweatRateHistory.push({date:todayISO(),sweatPerHr:sweatPerHr.toFixed(2),dehydPct:dehydPct.toFixed(1),temp:temp||null,notes:document.getElementById("sw-notes").value||"",ts:Date.now()});
      Store.set(STORAGE.settings,settings);
      result.innerHTML=`
        <div class="metric-label">SWEAT RATE</div>
        <div class="metric-value" style="color:var(--blue)">${sweatPerHr.toFixed(2)}<span style="font-size:14px;color:var(--text-2)"> L/hr</span></div>
        <div class="small muted" style="margin-top:4px">${(sweatPerHr*1000).toFixed(0)} ml/hr</div>

          <div class="small muted">Body mass loss</div>
          <div style="color:${dColor};font-weight:700;font-variant-numeric:tabular-nums">${dehydPct.toFixed(1)}% · ${dLabel}</div>
        </div>
        <div class="warn-box mt-12" style="padding:12px 14px">
          <div class="small" style="line-height:1.6">
            <b style="color:var(--blue)">During exercise:</b> aim ~${recDuringHr.toFixed(0)} ml/hr (80% replacement)<br>
            <b style="color:var(--blue)">Post-exercise replace:</b> ${recPostL.toFixed(2)} L over 2–4h (150% of net loss)<br>
            <b style="color:var(--blue)">Sodium:</b> 500–700 mg/L if &gt;1h hot conditions
          </div>
        </div>
        <div class="small muted mt-8" style="font-style:italic;font-size:10.5px">Saved to history · ACSM 2007 Sawka MSSE · NATA Casa 2019</div>
      `;
      flash("Sweat rate calculated · saved");
    });
  }

  // Charts
  drawWeightChart(entries,targetW);
  drawRhrHrvChart(entries);
  drawSleepChart(entries.slice(-30));
  drawPaceChart();
}

function avg(arr){const a=arr.filter(x=>!isNaN(x));return a.length?a.reduce((s,x)=>s+x,0)/a.length:0;}

/* Shared chart options helper */
const CHART_BASE={
  legend:{labels:{color:"#9A9AA0",font:{size:10,weight:"600"},usePointStyle:true,pointStyle:"circle",padding:14}},
  tooltip:{backgroundColor:"#1E1E22",borderColor:"#26262B",borderWidth:1,padding:12,titleFont:{size:12,weight:"700"},bodyFont:{size:12}},
  gridX:{grid:{display:false},ticks:{color:"#9A9AA0",font:{size:10,weight:"600"},maxTicksLimit:8}},
  gridY:{grid:{color:"rgba(255,255,255,0.04)"},ticks:{color:"#5A5A60",font:{size:10}},border:{display:false}}
};

function drawWeightChart(entries,targetW){
  const ctx=document.getElementById("ch-weight");if(!ctx)return;
  const data=entries.filter(e=>e.weight).slice(-90).map(e=>({x:e.date,y:parseFloat(e.weight)}));
  const rolling=data.map((p,i)=>{
    const window=data.slice(Math.max(0,i-6),i+1);
    return {x:p.x,y:avg(window.map(w=>w.y))};
  });
  // gradient under rolling avg
  const ctx2d=ctx.getContext("2d");
  const grad=ctx2d.createLinearGradient(0,0,0,240);
  grad.addColorStop(0,"rgba(255,107,0,0.18)");
  grad.addColorStop(1,"rgba(255,107,0,0)");
  if(biometricsCharts.weight)biometricsCharts.weight.destroy();
  biometricsCharts.weight=new Chart(ctx,{
    type:"line",
    data:{datasets:[
      {label:"Daily",data,borderColor:"rgba(154,154,160,0.4)",backgroundColor:"transparent",pointRadius:2.5,pointBackgroundColor:"#9A9AA0",borderWidth:1,tension:0},
      {label:"7-day avg",data:rolling,borderColor:"#FF6B00",backgroundColor:grad,fill:true,pointRadius:0,borderWidth:2.5,tension:0.35},
      ...(targetW?[{label:"Race target",data:data.map(p=>({x:p.x,y:parseFloat(targetW)})),borderColor:"#34D399",borderDash:[6,6],pointRadius:0,borderWidth:1.5}]:[])
    ]},
    options:{responsive:true,maintainAspectRatio:false,plugins:{legend:CHART_BASE.legend,tooltip:CHART_BASE.tooltip},scales:{x:{type:"category",...CHART_BASE.gridX},y:{...CHART_BASE.gridY,ticks:{...CHART_BASE.gridY.ticks,callback:v=>v+" kg"}}}}
  });
}
function drawRhrHrvChart(entries){
  const ctx=document.getElementById("ch-rhrhrv");if(!ctx)return;
  const slice=entries.slice(-90);
  const rhr=slice.filter(e=>e.rhr).map(e=>({x:e.date,y:parseInt(e.rhr)}));
  const hrv=slice.filter(e=>e.hrv).map(e=>({x:e.date,y:parseInt(e.hrv)}));
  if(biometricsCharts.rhrhrv)biometricsCharts.rhrhrv.destroy();
  biometricsCharts.rhrhrv=new Chart(ctx,{
    type:"line",
    data:{datasets:[
      {label:"RHR (bpm)",data:rhr,borderColor:"#F43F5E",backgroundColor:"transparent",pointRadius:2.5,pointBackgroundColor:"#F43F5E",borderWidth:2,yAxisID:"y",tension:0.3},
      {label:"HRV (ms)",data:hrv,borderColor:"#60A5FA",backgroundColor:"transparent",pointRadius:2.5,pointBackgroundColor:"#60A5FA",borderWidth:2,yAxisID:"y1",tension:0.3}
    ]},
    options:{responsive:true,maintainAspectRatio:false,plugins:{legend:CHART_BASE.legend,tooltip:CHART_BASE.tooltip},scales:{
      x:{type:"category",...CHART_BASE.gridX},
      y:{position:"left",grid:{color:"rgba(255,255,255,0.04)"},ticks:{color:"#F43F5E",font:{size:10,weight:"600"}},border:{display:false}},
      y1:{position:"right",grid:{drawOnChartArea:false},ticks:{color:"#60A5FA",font:{size:10,weight:"600"}},border:{display:false}}
    }}
  });
}
function drawSleepChart(entries){
  const ctx=document.getElementById("ch-sleep");if(!ctx)return;
  const data=entries.filter(e=>e.sleep).map(e=>({x:e.date,y:parseFloat(e.sleep)}));
  if(biometricsCharts.sleep)biometricsCharts.sleep.destroy();
  biometricsCharts.sleep=new Chart(ctx,{
    type:"bar",
    data:{datasets:[{label:"Sleep (hrs)",data,backgroundColor:data.map(d=>d.y>=7.5?"#34D399":d.y>=7?"#FF6B00":"#F43F5E"),borderRadius:4,borderSkipped:false}]},
    options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false},tooltip:CHART_BASE.tooltip},scales:{
      x:{type:"category",...CHART_BASE.gridX,ticks:{...CHART_BASE.gridX.ticks,maxTicksLimit:7}},
      y:{...CHART_BASE.gridY,ticks:{...CHART_BASE.gridY.ticks,callback:v=>v+"h"},suggestedMin:5,suggestedMax:10}
    }}
  });
}
function drawPaceChart(){
  const ctx=document.getElementById("ch-pace");if(!ctx)return;
  const log=Store.get(STORAGE.sessions,{});
  const z1=[],mp=[];
  for(const date in log){
    const lg=log[date];if(!lg.pace||(lg.status!=="done"&&lg.status!=="modified"))continue;
    const sec=paceToSec(lg.pace);if(!sec)continue;
    const t=lg.type;
    if(t==="easy_z1"||t==="recovery") z1.push({x:date,y:sec});
    else if(t==="mp_long"||t==="speed") mp.push({x:date,y:sec});
  }
  z1.sort((a,b)=>a.x.localeCompare(b.x));mp.sort((a,b)=>a.x.localeCompare(b.x));
  if(biometricsCharts.pace)biometricsCharts.pace.destroy();
  biometricsCharts.pace=new Chart(ctx,{
    type:"line",
    data:{datasets:[
      {label:"Z1 easy pace",data:z1,borderColor:"#34D399",backgroundColor:"transparent",pointRadius:3,pointBackgroundColor:"#34D399",borderWidth:2,tension:0.3},
      {label:"Quality pace",data:mp,borderColor:"#FF6B00",backgroundColor:"transparent",pointRadius:3,pointBackgroundColor:"#FF6B00",borderWidth:2,tension:0.3}
    ]},
    options:{responsive:true,maintainAspectRatio:false,plugins:{legend:CHART_BASE.legend,tooltip:{...CHART_BASE.tooltip,callbacks:{label:c=>c.dataset.label+": "+fmtPaceFromSec(c.parsed.y)+"/km"}}},scales:{
      x:{type:"category",...CHART_BASE.gridX,ticks:{...CHART_BASE.gridX.ticks,maxTicksLimit:6}},
      y:{reverse:true,...CHART_BASE.gridY,ticks:{...CHART_BASE.gridY.ticks,callback:v=>fmtPaceFromSec(v)}}
    }}
  });
}

        <table class="tbl" style="font-size:12.5px">
          <thead><tr><th>Day</th><th>Session</th><th>Zone</th><th>Rationale</th></tr></thead>
          <tbody>
            <tr><td><b>Mon</b></td><td>Strength A + Plyo (Box jump)</td><td>Strength</td><td>Fresh after Sun rest · ≥6h before Tue easy run (AMPK/mTOR buffer · Fyfe 2018)</td></tr>

        });
      }

  });

        </div>
        <div class="ex-card">
          <div class="ex-name">3 · Pigeon stretch</div>

        </div>
        <div class="ex-card">

        </div>

        </div>

    <!-- ============ K10 · CRAMP / BONK EMERGENCY ============ -->
    <div class="card mb-16">
      <div class="card-h">🚨 K10 · ON-RACE EMERGENCY PROTOCOLS</div>

      <div class="grid grid-2 mt-12">
        <div class="ex-card" style="border:1px solid rgba(244,63,94,0.3);background:linear-gradient(135deg,rgba(244,63,94,0.04),var(--card-elev))">
          <div class="ex-name" style="color:var(--red)">CRAMP (EAMC)</div>
          <div class="small mt-12" style="line-height:1.7">
            <b>Mechanism:</b> Strongest evidence supports altered neuromuscular control / fatigue theory — NOT primarily electrolyte depletion (Schwellnus 2009 <i>BJSM</i> review).<br><br>
            <b>Treatment (in order):</b>
            <ol style="padding-left:18px;margin-top:6px">
              <li>STOP. Slow / stop running.</li>
              <li>Gentle static stretch of cramping muscle (30–60s)</li>
              <li>Sip pickle juice / mustard / vinegar 30–60 ml — relief in ~85 s via TRPV1 oropharyngeal reflex (Miller 2010 <i>MSSE</i>) — this is NOT an electrolyte effect</li>
              <li>Sip electrolyte drink (preventive · adequacy)</li>
              <li>Resume at 30–60 sec/km slower for 5 min before re-evaluating</li>
            </ol>
            <b>Prevention:</b> Train at race intensity (specificity); maintain hydration; avoid going out hard.
          </div>
        </div>

        <div class="ex-card" style="border:1px solid rgba(255,107,0,0.3);background:linear-gradient(135deg,rgba(255,107,0,0.04),var(--card-elev))">
          <div class="ex-name" style="color:var(--orange)">BONK (Glycogen depletion / hypoglycemia)</div>
          <div class="small mt-12" style="line-height:1.7">
            <b>Mechanism:</b> Muscle/liver glycogen depletion at sustained submaximal work limits performance; blood glucose drop affects CNS (Coyle 1986 <i>J Appl Physiol</i>; Burke 2017 <i>Sports Med</i> review).<br><br>
            <b>Treatment:</b>
            <ol style="padding-left:18px;margin-top:6px">
              <li>Reduce pace immediately by 30–60 sec/km</li>
              <li>Ingest 60 g rapid CHO: 1 gel + 200 ml sports drink + handful gummies if available</li>
              <li>Allow 15–20 min for absorption — DO NOT push through</li>
              <li>If recovered → resume at slightly slower goal pace</li>
              <li>If not recovered in 20 min → walk to finish; race is salvage mode</li>
            </ol>
            <b>Prevention:</b> 60–90 g CHO/hr from km 5 onwards (Jeukendrup 2014 <i>Sports Med</i>) · multi-transportable carbs (glucose+fructose 2:1) · D-1 carb load 6–10 g/kg
          </div>
        </div>

        <div class="ex-card" style="border:1px solid rgba(96,165,250,0.3);background:linear-gradient(135deg,rgba(96,165,250,0.04),var(--card-elev));grid-column:span 2">
          <div class="ex-name" style="color:var(--blue)">⚠ HYPONATREMIA — DANGER (Exercise-Associated Hyponatremia · EAH)</div>
          <div class="small mt-12" style="line-height:1.7">
            Drinking water in EXCESS of fluid losses dilutes blood sodium and can cause cerebral edema and death. Risk factors: slow runner pace (>4h finish), aggressive water-only intake at every aid, female sex, NSAID use. (Hew-Butler 2015 <i>Clin J Sport Med</i> consensus statement)<br><br>
            <b>Rules:</b>
            <ul style="padding-left:18px;margin-top:6px">
              <li>Drink to PLAN (sweat-rate based · K2 calculator), not to thirst-only AND not to "stay ahead"</li>
              <li>Use electrolyte drink (not plain water) when fluid intake &gt;500 ml/hr</li>
              <li>Symptoms: nausea, headache, confusion, swelling fingers/face, cramping (post-race) → STOP fluid + seek medical</li>
              <li>For sub-4:30 finish + Bangkok-trained athlete: not high risk, but stay disciplined</li>
            </ul>
          </div>
        </div>
      </div>
    </div>

    <!-- ============ K14 · PACING STRATEGY ============ -->
    <div class="card mb-16">
      <div class="card-h">🎯 K14 · MARATHON PACING STRATEGIES</div>
      <div class="small muted mt-12" style="line-height:1.6">Three pacing patterns dominate marathon racing. Choice has measurable effect on outcome.</div>

      <div class="grid grid-3 mt-16">
        <div class="ex-card" style="border-color:rgba(52,211,153,0.35)">
          <div class="ex-name" style="color:var(--green)">EVEN SPLIT</div>
          <div class="small mt-8" style="line-height:1.6">Same pace from km 1 to finish. Most world-record marathons are run very close to even (within 1–2%). (Hanley 2014 <i>Front Physiol</i>)</div>
          <div class="small mt-8" style="color:var(--text-2)"><b>For James:</b> 6:23/km × 42.2 = <b style="color:var(--text)">4:29:30</b></div>
          <span class="ex-tag" style="background:rgba(52,211,153,0.15);color:var(--green)">Default · simplest mentally</span>
        </div>
        <div class="ex-card" style="border-color:rgba(255,107,0,0.35)">
          <div class="ex-name" style="color:var(--orange)">NEGATIVE SPLIT (recommended)</div>
          <div class="small mt-8" style="line-height:1.6">Slightly faster 2nd half. Preserves glycogen + form; lower bonk risk for amateurs. Associated with better outcomes in non-elite (Diaz et al. 2018 <i>Eur J Sport Sci</i>).</div>
          <div class="small mt-8" style="color:var(--text-2)"><b>For James:</b> 1st half 6:25 · 2nd half 6:21 = <b style="color:var(--text)">~4:29:00</b></div>
          <span class="ex-tag" style="background:rgba(255,107,0,0.15);color:var(--orange)">Recommended · safer execution</span>
        </div>
        <div class="ex-card" style="border-color:rgba(244,63,94,0.35)">
          <div class="ex-name" style="color:var(--red)">POSITIVE SPLIT (avoid)</div>
          <div class="small mt-8" style="line-height:1.6">Went out too fast → 2nd half slower. Common amateur error. Slowdown &gt;2% (≈8 sec/km) signals significant glycogen / form failure (Hanley 2014).</div>
          <div class="small mt-8" style="color:var(--text-2)"><b>Avoid by:</b> first 5 km HR &lt;158 disciplined; check pace at 5K split</div>
          <span class="ex-tag" style="background:rgba(244,63,94,0.15);color:var(--red)">Most common failure mode</span>
        </div>
      </div>

      <div class="card mt-16" style="background:var(--card-elev)">
        <div class="card-h">FUJI RACE PLAN — NEGATIVE SPLIT EXECUTION</div>
        <div class="tbl-wrap mt-12" style="background:transparent;border:none">
          <table class="tbl" style="font-size:13px">
            <thead><tr><th>Segment</th><th>Target Pace</th><th>HR</th><th>Mental Cue</th></tr></thead>
            <tbody>

              <tr><td><b>km 21–30</b></td><td>6:23</td><td>158–164</td><td>"The race starts at 30."</td></tr>

            </tbody>

        </div>
      </div>
    </div>

    <!-- ============ K13 · FAILURE MODES ============ -->
    <div class="card mb-16">
      <div class="card-h">🛟 K13 · FAILURE MODE RECOVERY</div>
      <div class="small muted mt-12">When things go wrong — don't improvise. Below are evidence-anchored protocols.</div>
      <div class="tbl-wrap mt-16">
        <table class="tbl">
          <thead><tr><th style="min-width:180px">Situation</th><th>Action</th><th>Source</th></tr></thead>
          <tbody>
            <tr><td><b>Behind plan 1–3 days</b></td><td>Resume current. <b>Don't double up sessions.</b> The plan absorbs minor disruption.</td><td><i>Coaching practice</i></td></tr>
            <tr><td><b>Behind 1 week</b></td><td>Skip what was missed. Resume current week. If at phase transition, hold an extra week in current phase.</td><td><i>Coaching practice</i></td></tr>
            <tr><td><b>Sick — fever / body aches / chest involvement</b></td><td>NO training while symptomatic. Resume Z1 only when 24h fever-free. "Above the neck" rule has limited support — when in doubt, REST.</td><td>Schwellnus 2016 BJSM consensus on illness in athletes</td></tr>
            <tr><td><b>Mild injury (1–2 wk)</b></td><td>Maintain aerobic fitness via cross-training (cycle / swim / pool run) at equivalent HR for equivalent time. Detraining is minimal in ≤2 wk.</td><td>Mujika 2000 <i>IJSPP</i> detraining review</td></tr>
            <tr><td><b>Significant injury (&gt;2 wk)</b></td><td>See physiotherapist. Consider downgrading Fuji to "B-effort". Trail/Hyrox become assessment races, not goals.</td><td><i>Clinical practice</i></td></tr>
            <tr><td><b>Plateau — no improvement 4+ wk · sleep poor · RHR ↑ unexplained</b></td><td>Signs of functional overreaching. Take 5–7 days complete rest + sleep extension. Resume at 50% volume. If symptoms persist &gt;2 wk → likely OTS.</td><td>Meeusen 2013 MSSE consensus on overtraining</td></tr>
            <tr><td><b>Travel disruption (work / family)</b></td><td>Maintain Z1 base only. Skip quality rather than do bad quality. 1 wk travel = minimal fitness loss.</td><td><i>Coaching practice</i></td></tr>
            <tr><td><b>ACWR &gt; 1.5 (Dashboard)</b></td><td>Reduce load by 30% next week. Drop optional Hyrox prep overlay if active.</td><td>Gabbett 2016 <i>BJSM</i></td></tr>
          </tbody>
        </table>

    <!-- ============ K12 · GLOSSARY ============ -->
    <div class="card mb-16">
      <div class="card-h">📖 K12 · GLOSSARY · "WHY THIS WORKS"</div>
      <div class="small muted mt-12" style="line-height:1.6">Core terms used throughout this app, with peer-reviewed sources for each. If a term seems vague in the plan, look it up here.</div>
      <div class="knowledge-grid mt-16">
        <div class="term-card">
          <div class="term-name">VO₂max</div>
          <div class="term-def">Maximal rate of oxygen consumption during incremental exercise. Genetic ceiling + ~15–20% trainable. Key driver of "engine size" but plateaus quickly in trained athletes.</div>
          <div class="term-cite">Saltin & Calbet 2006 J Appl Physiol</div>
        </div>
        <div class="term-card">
          <div class="term-name">VT1 / LT1 (Aerobic threshold)</div>
          <div class="term-def">First inflection where blood lactate begins rising above baseline (~2 mmol/L). Upper limit of pure fat-oxidation zone. James: HR 155.</div>
          <div class="term-cite">Skinner & McLellan 1980 Res Q Exerc Sport</div>
        </div>
        <div class="term-card">
          <div class="term-name">VT2 / LT2 (Anaerobic threshold)</div>
          <div class="term-def">Second inflection where lactate accumulates exponentially (~4 mmol/L). Maximum sustainable steady-state intensity (~30–60 min). James: HR 171.</div>
          <div class="term-cite">Beaver et al. 1986 J Appl Physiol</div>
        </div>
        <div class="term-card">
          <div class="term-name">vVO₂max</div>
          <div class="term-def">Velocity at which VO₂max is reached. Used to prescribe VO₂max intervals (3–5 min @ 95–100% vVO₂max). James: 13.9 km/h (4:19/km).</div>
          <div class="term-cite">Billat 2001 Sports Med</div>
        </div>
        <div class="term-card">
          <div class="term-name">VLamax</div>
          <div class="term-def">Maximal rate of lactate accumulation (glycolytic capacity). LOWER VLamax = better fat oxidation at marathon pace. Marathon-specific lever.</div>
          <div class="term-cite">Mader 1986 Int J Sports Med · Heuberger 2018 review</div>
        </div>
        <div class="term-card">
          <div class="term-name">Fractional Utilization (%VO₂max)</div>
          <div class="term-def">% of VO₂max sustainable for race duration. Marathon runners typically sustain 75–85%. Trainable via tempo + threshold work.</div>
          <div class="term-cite">Joyner & Coyle 2008 J Physiol</div>
        </div>
        <div class="term-card">
          <div class="term-name">Running Economy (RE)</div>
          <div class="term-def">O₂ cost at submaximal pace. Better RE = less energy at any speed. Most trainable lever for someone with VO₂max ceiling. Improved by HL strength + plyometrics + technique.</div>
          <div class="term-cite">Saunders 2004 Sports Med · Llanos-Lagos 2024 Sports Med MA</div>
        </div>
        <div class="term-card">
          <div class="term-name">Mitochondrial Density</div>
          <div class="term-def">Number/size of mitochondria per muscle fiber. Z1 volume primary stimulus. Determines aerobic capacity at cellular level.</div>
          <div class="term-cite">Holloszy 1967 J Biol Chem · Hawley 2014 Cell</div>
        </div>
        <div class="term-card">
          <div class="term-name">Capillary Density</div>
          <div class="term-def">Capillaries per muscle fiber. Improves O₂ delivery + lactate clearance. Z1/Z2 stimulus.</div>
          <div class="term-cite">Hoppeler et al. 1985 J Appl Physiol</div>
        </div>
        <div class="term-card">
          <div class="term-name">Lactate Shuttle</div>
          <div class="term-def">Lactate is transported between cells/tissues as fuel + signaling — not waste. Hard work increases shuttle capacity (lactate clearance).</div>
          <div class="term-cite">Brooks 2009 J Physiol · 2018 Cell Metab</div>
        </div>
        <div class="term-card">
          <div class="term-name">Cardiac Drift</div>
          <div class="term-def">HR rises at constant pace over time due to plasma-volume loss, thermal stress, glycogen depletion. Inverse marker of aerobic durability.</div>
          <div class="term-cite">Coyle 2005 Sports Med</div>
        </div>
        <div class="term-card">
          <div class="term-name">Aerobic Decoupling</div>
          <div class="term-def">Ratio of HR to pace drift between 1st and 2nd half of long run. Coaching heuristic: &lt;5% = good durability. Mechanism = cardiac drift.</div>
          <div class="term-cite">Friel framework · mechanism Coyle 2005</div>
        </div>
        <div class="term-card">
          <div class="term-name">Polarized TID</div>
          <div class="term-def">~80% Z1 / ~5% Z2 / ~15% Z3 distribution. Strong evidence for VO₂max gain. Best for sub-elite + shorter events.</div>
          <div class="term-cite">Stöggl & Sperlich 2014 Front Physiol · Muñoz 2014 IJSPP</div>
        </div>
        <div class="term-card">
          <div class="term-name">Pyramidal TID</div>
          <div class="term-def">~80% Z1 / ~15% Z2 / ~5% Z3. What world-class marathoners actually do — race specificity wins late-season.</div>
          <div class="term-cite">Casado 2022 IJSPP review</div>
        </div>
        <div class="term-card">
          <div class="term-name">ACWR</div>
          <div class="term-def">Acute (7d) ÷ chronic (28d) workload ratio. Sweet spot 0.8–1.3. &gt;1.5 = significantly elevated injury risk.</div>
          <div class="term-cite">Gabbett 2016 BJSM</div>
        </div>
        <div class="term-card">
          <div class="term-name">Block Periodization (POL→PYR)</div>
          <div class="term-def">Sequential blocks with different TID emphasis (e.g. polarized in Phase 1, pyramidal in Phase 3). Outperforms static TID by ~2.4% TT.</div>
          <div class="term-cite">Filipas 2021 MSSE · Esteve-Lanao 2017 IJSPP</div>
        </div>
      </div>
    </div>
  `;
}

function renderSettings(){

    <div class="card mb-16">

        <div class="field"><label>Race date</label><input value="${ATHLETE.race.date}" disabled></div>
      </div>
      <div class="field-row">
        <div class="field"><label>Plan start</label><input value="${ATHLETE.planStart}" disabled></div>
        <div class="field"><label>Total weeks</label><input value="${ATHLETE.totalWeeks}" disabled></div>
      </div>
      <div class="small muted">To change athlete data, edit the <code>ATHLETE</code> constant at the top of the script.</div>
    </div>

    <div class="card mb-16">
      <div class="card-h">Backup / Restore</div>
      <div class="row mt-12">
        <button class="btn btn-primary" id="btn-export">Export all data (JSON)</button>
        <button class="btn" id="btn-import">Import from JSON</button>
      </div>
      <div class="small muted mt-12">Export downloads a JSON snapshot of all sessions, strength logs, and readiness. Save it as a backup or transfer to another device.</div>
    </div>

    <div class="card mb-16">
      <div class="card-h">Storage Stats</div>
      ${(()=>{
        const sess=Object.keys(Store.get(STORAGE.sessions,{})).length;
        const str=(Store.get(STORAGE.strength,[])||[]).length;
        const re=Object.keys(Store.get(STORAGE.readiness,{})).length;
        return `
          <div class="grid grid-3 mt-12">
            <div class="metric"><div class="metric-label">Sessions logged</div><div class="metric-value">${sess}</div></div>
            <div class="metric"><div class="metric-label">Strength logs</div><div class="metric-value">${str}</div></div>
            <div class="metric"><div class="metric-label">Readiness entries</div><div class="metric-value">${re}</div></div>
          </div>`;
      })()}
    </div>

    <div class="card">
      <div class="card-h" style="color:var(--red)">Danger Zone</div>
      <div class="row mt-12">
        <button class="btn" id="btn-clear-sess">Clear session log</button>
        <button class="btn" id="btn-clear-strength">Clear strength log</button>
        <button class="btn" id="btn-clear-all" style="background:rgba(255,69,58,0.15);color:var(--red)">Clear EVERYTHING</button>
      </div>
    </div>
  `;
  document.getElementById("btn-export").addEventListener("click",()=>{
    const data=Store.exportAll();
    const blob=new Blob([JSON.stringify(data,null,2)],{type:"application/json"});
    const url=URL.createObjectURL(blob);
    const a=document.createElement("a");
    a.href=url;a.download=`fuji-backup-${todayISO()}.json`;a.click();
    URL.revokeObjectURL(url);
  });
  document.getElementById("btn-import").addEventListener("click",()=>{
    const inp=document.createElement("input");
    inp.type="file";inp.accept="application/json";
    inp.onchange=e=>{
      const f=e.target.files[0];if(!f)return;
      const r=new FileReader();
      r.onload=ev=>{
        try{const obj=JSON.parse(ev.target.result);Store.importAll(obj);flash("Imported successfully");renderSettings();}
        catch(err){alert("Invalid JSON file");}
      };r.readAsText(f);
    };inp.click();
  });
  document.getElementById("btn-clear-sess").addEventListener("click",()=>{if(confirm("Clear all session logs?")){Store.clear(STORAGE.sessions);renderSettings();}});
  document.getElementById("btn-clear-strength").addEventListener("click",()=>{if(confirm("Clear all strength logs?")){Store.clear(STORAGE.strength);renderSettings();}});
  document.getElementById("btn-clear-all").addEventListener("click",()=>{
    if(confirm("⚠ This will delete ALL data permanently. Continue?")){
      for(const k in STORAGE)Store.clear(STORAGE[k]);
      renderSettings();flash("All data cleared");
    }
  });
}

/* =========================================================================
   20. UTILITIES
   ========================================================================= */
function escapeHtml(s){return String(s||"").replace(/[&<>"']/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"})[c]);}

// Map a session-type string to a primary HR zone bucket.
// Used so TID% reflects what the user actually did, not the planned session
// (e.g. user logs "modified" and changes easy_z1 → speed).
function typeToZone(t){
  if(!t)return null;
  if(t==="easy_z1"||t==="recovery"||t==="long_run")return "z1";
  if(t==="mp_long"||t==="tune_race")return "z2";
  if(t==="hill")return "mixed";
  if(t==="speed"||t==="strength_a"||t==="strength_b"||t==="rest")return null; // fall back to planned
  return null;
}
function zoneForLog(lg,planned){
  // The session modal saves the actually-performed session type as `lg.type`.
  // When the user logs "modified" + changes type, prefer that for TID%.
  if(lg && lg.type){
    const z=typeToZone(lg.type);
    if(z)return z;
  }
  return planned ? planned.zone : null;
}
function flash(msg){
  const f=document.createElement("div");
  f.innerHTML=`<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" style="display:inline-block;vertical-align:-2px;margin-right:6px;color:#34D399"><polyline points="20 6 9 17 4 12"/></svg>${msg}`;
  f.style.cssText="position:fixed;bottom:90px;left:50%;transform:translateX(-50%) translateY(20px);background:rgba(30,30,34,0.95);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);color:#fff;padding:12px 22px;border-radius:999px;border:1px solid #26262B;z-index:200;font-size:13px;font-weight:600;letter-spacing:-0.005em;box-shadow:0 12px 32px rgba(0,0,0,0.5);opacity:0;transition:all 0.3s cubic-bezier(0.32,0.72,0,1)";
  document.body.appendChild(f);
  requestAnimationFrame(()=>{f.style.opacity="1";f.style.transform="translateX(-50%) translateY(0)";});
  setTimeout(()=>{f.style.opacity="0";f.style.transform="translateX(-50%) translateY(10px)";setTimeout(()=>f.remove(),300);},2000);
}

/* =========================================================================
   21. INIT
   ========================================================================= */
let __countdownTimer=null;
function init(){
  State.init();
  setupMobileChrome();
  renderNav();
  renderCountdown();
  // Storage unavailable → show a non-blocking banner once per tab.
  if(!__storageOK && !sessionStorage.getItem("__fuji_storage_warned")){
    try{ sessionStorage.setItem("__fuji_storage_warned","1"); }catch(_){}
    showStorageWarning();
  }
  // First-run welcome (skip if storage is broken — would re-show every load)
  if(__storageOK && !Store.get("fuji_first_run",false)){
    showWelcome();
    Store.set("fuji_first_run",true);
  }
  switchView("weekly");
  // Recompute countdown hourly. Clear any prior timer in case init runs twice.
  if(__countdownTimer)clearInterval(__countdownTimer);
  __countdownTimer=setInterval(renderCountdown,3600000);
}

function showStorageWarning(){
  const b=document.createElement("div");
  b.setAttribute("role","alert");
  b.style.cssText="position:fixed;left:50%;bottom:calc(20px + var(--safe-b));transform:translateX(-50%);max-width:90vw;background:rgba(244,63,94,0.16);border:1px solid rgba(244,63,94,0.5);color:#fff;padding:12px 18px 12px 14px;border-radius:14px;font-size:13px;z-index:300;backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);box-shadow:0 12px 32px rgba(0,0,0,0.5);display:flex;align-items:center;gap:10px";
  b.innerHTML='<span style="font-size:16px">⚠️</span><span style="flex:1">Storage unavailable — logs won’t persist (Private Mode?). Export JSON if you need to keep data.</span><button aria-label="Dismiss" style="background:transparent;border:none;color:#fff;font-size:18px;cursor:pointer;padding:0 4px">×</button>';
  b.querySelector("button").addEventListener("click",()=>b.remove());
  document.body.appendChild(b);
  setTimeout(()=>{if(b.parentNode)b.remove();},10000);
}

// Single init: either DOM is still loading (wait), or it's already parsed (run now).
if(document.readyState==="loading") document.addEventListener("DOMContentLoaded",init,{once:true});
else init();

/* ============================================================
   PWA · Service Worker registration (offline cache)
   Requires sw.js at site root · works on Vercel/Netlify/GH Pages
   ============================================================ */
if("serviceWorker" in navigator && (location.protocol==="https:" || location.hostname==="localhost" || location.hostname==="127.0.0.1")){
  window.addEventListener("load",()=>{
    navigator.serviceWorker.register("./sw.js").then(reg=>{
      console.log("[PWA] SW registered · scope:",reg.scope);
    }).catch(err=>{
      console.log("[PWA] SW registration skipped:",err.message);
