<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
<meta name="theme-color" content="#1C1C1E">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Endurance 2026">
<meta name="mobile-web-app-capable" content="yes">
<title>James Endurance Plan 2026</title>
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Crect width='100' height='100' fill='%23FF9F0A' rx='22'/%3E%3Ctext x='50' y='68' font-family='-apple-system' font-size='56' font-weight='700' text-anchor='middle' fill='%23000'%3EJ%3C/text%3E%3C/svg%3E">
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.0/chart.umd.min.js"></script>
<style>
/* ---------- RESET / BASE ---------- */
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%;overscroll-behavior:none}
body{
  font-family:-apple-system,BlinkMacSystemFont,system-ui,"SF Pro Text","Helvetica Neue",sans-serif;
  background:#1C1C1E;color:#FFFFFF;font-size:14px;line-height:1.45;
  -webkit-font-smoothing:antialiased;
  font-feature-settings:"tnum","cv11";
  letter-spacing:-0.01em;
}
button,input,select,textarea{font:inherit;color:inherit;background:transparent;border:none;outline:none}
button{cursor:pointer}
::-webkit-scrollbar{width:8px;height:8px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:#3A3A3C;border-radius:4px}

/* ---------- VARIABLES ---------- */
:root{
  --bg:#1C1C1E;
  --card:#2C2C2E;
  --card-hi:#3A3A3C;
  --border:#3A3A3C;
  --text:#FFFFFF;
  --text-2:#8E8E93;
  --text-3:#636366;
  --orange:#FF9F0A;
  --green:#30D158;
  --red:#FF453A;
  --blue:#0A84FF;
  --purple:#BF5AF2;
  --gray:#48484A;
  --rest:#48484A;
  --sb-w:240px;
  --safe-t:env(safe-area-inset-top,0px);
  --safe-b:env(safe-area-inset-bottom,0px);
}

/* ---------- LAYOUT ---------- */
#app{display:flex;min-height:100vh;min-height:100svh}
#sidebar{
  width:var(--sb-w);flex-shrink:0;
  background:#161618;border-right:1px solid var(--border);
  display:flex;flex-direction:column;padding:24px 16px 16px;
  position:sticky;top:0;height:100vh;height:100svh;
  padding-top:calc(24px + var(--safe-t));
}
#main{flex:1;min-width:0;padding:24px 28px;padding-top:calc(24px + var(--safe-t));padding-bottom:calc(24px + var(--safe-b))}

/* ---------- SIDEBAR ---------- */
.brand{display:flex;align-items:center;gap:12px;margin-bottom:28px;padding:0 6px}
.avatar{width:40px;height:40px;border-radius:50%;background:var(--orange);color:#000;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:18px;flex-shrink:0}
.brand-text{min-width:0}
.brand-name{font-weight:600;font-size:15px;color:var(--text);line-height:1.1}
.brand-sub{font-size:11px;color:var(--orange);margin-top:2px;font-weight:500;letter-spacing:0.02em;text-transform:uppercase}

.nav{display:flex;flex-direction:column;gap:2px;flex:1}
.nav-item{
  display:flex;align-items:center;gap:12px;padding:10px 12px;border-radius:10px;
  color:var(--text-2);font-size:13.5px;font-weight:500;
  min-height:40px;transition:background .12s,color .12s;
}
.nav-item:hover{background:rgba(255,255,255,0.04);color:var(--text)}
.nav-item.active{background:var(--card);color:var(--text)}
.nav-item.active .nav-icon{color:var(--orange)}
.nav-icon{width:18px;height:18px;display:inline-flex;align-items:center;justify-content:center;color:var(--text-3);flex-shrink:0}
.nav-icon svg{width:18px;height:18px}

.countdown{margin-top:12px;padding:14px 12px;border:1px solid var(--border);border-radius:12px;text-align:center}
.countdown-num{font-size:34px;font-weight:700;color:var(--orange);line-height:1;font-variant-numeric:tabular-nums;letter-spacing:-0.02em}
.countdown-label{font-size:11px;color:var(--text-2);margin-top:4px;text-transform:uppercase;letter-spacing:0.05em;font-weight:500}
.progress{height:4px;background:var(--card-hi);border-radius:2px;margin-top:10px;overflow:hidden}
.progress-fill{height:100%;background:var(--orange);transition:width .3s}
.countdown-meta{font-size:10.5px;color:var(--text-3);margin-top:6px}

/* ---------- VIEWS ---------- */
.view{display:none;animation:fade .15s ease-out}
.view.active{display:block}
@keyframes fade{from{opacity:0}to{opacity:1}}

.view-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:24px;flex-wrap:wrap;gap:16px}
.view-title{font-size:26px;font-weight:700;letter-spacing:-0.02em}
.view-sub{font-size:13px;color:var(--text-2);margin-top:4px}

/* ---------- COMPONENTS ---------- */
.card{background:var(--card);border-radius:14px;padding:18px;border:1px solid transparent}
.card-h{font-size:11.5px;font-weight:600;color:var(--text-2);text-transform:uppercase;letter-spacing:0.06em;margin-bottom:10px}

.btn{display:inline-flex;align-items:center;justify-content:center;gap:6px;padding:9px 14px;border-radius:10px;font-size:13.5px;font-weight:600;background:var(--card);color:var(--text);min-height:36px;transition:background .12s}
.btn:hover{background:var(--card-hi)}
.btn-primary{background:var(--orange);color:#000}
.btn-primary:hover{background:#FFB340}
.btn-ghost{background:transparent;border:1px solid var(--border)}
.btn-icon{padding:8px;min-width:36px}

.chip{display:inline-flex;align-items:center;gap:6px;padding:4px 10px;border-radius:999px;font-size:11.5px;font-weight:600;background:var(--card-hi);color:var(--text)}
.chip-orange{background:rgba(255,159,10,0.15);color:var(--orange)}
.chip-green{background:rgba(48,209,88,0.15);color:var(--green)}
.chip-red{background:rgba(255,69,58,0.15);color:var(--red)}
.chip-blue{background:rgba(10,132,255,0.15);color:var(--blue)}
.chip-purple{background:rgba(191,90,242,0.15);color:var(--purple)}

/* ---------- METRIC GRID ---------- */
.grid{display:grid;gap:14px}
.grid-4{grid-template-columns:repeat(4,1fr)}
.grid-3{grid-template-columns:repeat(3,1fr)}
.grid-2{grid-template-columns:repeat(2,1fr)}
@media(max-width:900px){.grid-4{grid-template-columns:repeat(2,1fr)}.grid-3{grid-template-columns:1fr}}
@media(max-width:600px){.grid-2{grid-template-columns:1fr}}

.metric{padding:16px}
.metric-label{font-size:11px;color:var(--text-2);text-transform:uppercase;letter-spacing:0.05em;font-weight:600}
.metric-value{font-size:28px;font-weight:700;margin-top:6px;font-variant-numeric:tabular-nums;letter-spacing:-0.02em;line-height:1.1}
.metric-sub{font-size:12px;color:var(--text-2);margin-top:4px}
.metric-sub.up{color:var(--green)}
.metric-sub.down{color:var(--red)}

/* ---------- WEEKLY VIEW ---------- */
.week-bar{display:flex;align-items:center;justify-content:space-between;margin-bottom:18px;gap:12px;flex-wrap:wrap}
.week-nav{display:flex;align-items:center;gap:4px}
.wk-arrow{width:36px;height:36px;display:flex;align-items:center;justify-content:center;border-radius:10px;background:var(--card)}
.wk-arrow:hover{background:var(--card-hi)}
.wk-label{padding:0 12px;font-weight:600;font-size:15px;min-width:200px;text-align:center}
.wk-range{font-size:12px;color:var(--text-2);font-weight:400;margin-top:2px}

.week-layout{display:grid;grid-template-columns:1fr 240px;gap:18px}
@media(max-width:1100px){.week-layout{grid-template-columns:1fr}}

.day-row{
  display:flex;align-items:stretch;gap:12px;
  background:var(--card);border-radius:12px;margin-bottom:8px;overflow:hidden;
  border:1px solid transparent;transition:border-color .12s;
}
.day-row.today{border-color:var(--orange)}
.day-row.modified{border-style:dashed;border-color:var(--orange)}
.day-stripe{width:4px;flex-shrink:0;background:var(--gray)}
.day-label{padding:14px 0 14px 12px;width:60px;flex-shrink:0}
.day-name{font-size:12px;color:var(--text-2);font-weight:600;text-transform:uppercase;letter-spacing:0.04em}
.day-date{font-size:18px;font-weight:700;margin-top:2px;font-variant-numeric:tabular-nums;letter-spacing:-0.02em}
.day-body{flex:1;padding:14px 12px;min-width:0}
.day-type-row{display:flex;align-items:center;gap:8px;margin-bottom:6px;flex-wrap:wrap}
.day-title{font-size:14.5px;font-weight:600;color:var(--text)}
.day-detail{font-size:12.5px;color:var(--text-2);margin-top:2px;line-height:1.4}
.day-meta{display:flex;gap:12px;margin-top:8px;font-size:11.5px;color:var(--text-3);flex-wrap:wrap}
.day-meta span{display:inline-flex;align-items:center;gap:4px}
.day-evidence{font-size:10.5px;color:var(--text-3);margin-top:6px;font-style:italic}
.day-actions{display:flex;align-items:center;padding:14px 14px 14px 6px;gap:6px;flex-shrink:0}
.checkbox{
  width:28px;height:28px;border-radius:50%;border:2px solid var(--text-3);
  display:flex;align-items:center;justify-content:center;
  transition:background .12s,border-color .12s;
}
.checkbox.done{background:var(--green);border-color:var(--green)}
.checkbox.done svg{display:block}
.checkbox svg{display:none;width:16px;height:16px;color:#000}
.checkbox.skipped{background:var(--gray);border-color:var(--gray)}
.checkbox.skipped::after{content:"×";color:#fff;font-size:18px;font-weight:700;line-height:1}
.icon-btn{width:32px;height:32px;border-radius:8px;display:flex;align-items:center;justify-content:center;color:var(--text-3)}
.icon-btn:hover{background:var(--card-hi);color:var(--text)}

/* type colors for stripe */
.t-easy_z1{background:var(--green)!important}
.t-recovery{background:var(--green)!important;opacity:.6}
.t-speed{background:var(--red)!important}
.t-long_run{background:var(--blue)!important}
.t-hill{background:var(--blue)!important}
.t-strength_a,.t-strength_b{background:var(--purple)!important}
.t-rest{background:var(--gray)!important}
.t-mp_long{background:var(--blue)!important}
.t-tune_race{background:var(--orange)!important}

/* TID bars */
.tid-row{margin-bottom:10px}
.tid-head{display:flex;justify-content:space-between;font-size:11.5px;margin-bottom:4px}
.tid-head .label{font-weight:600;color:var(--text-2);text-transform:uppercase;letter-spacing:0.04em}
.tid-head .pct{color:var(--text);font-variant-numeric:tabular-nums}
.tid-track{height:6px;background:var(--card-hi);border-radius:3px;overflow:hidden;position:relative}
.tid-fill{height:100%;border-radius:3px;transition:width .3s}
.tid-target{position:absolute;top:-2px;width:2px;height:10px;background:var(--text);opacity:.5}

/* ---------- MODAL ---------- */
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,0.6);backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px);z-index:100;display:flex;align-items:center;justify-content:center;padding:20px;animation:fade .15s}
.modal{background:#2C2C2E;border-radius:16px;width:100%;max-width:440px;max-height:90vh;overflow:auto;border:1px solid var(--border)}
.modal-h{padding:18px 20px;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:center}
.modal-title{font-size:17px;font-weight:600}
.modal-body{padding:18px 20px}
.modal-foot{padding:14px 20px;border-top:1px solid var(--border);display:flex;justify-content:flex-end;gap:8px}

.field{margin-bottom:14px}
.field label{display:block;font-size:11.5px;color:var(--text-2);font-weight:600;margin-bottom:6px;text-transform:uppercase;letter-spacing:0.04em}
.field input,.field select,.field textarea{
  width:100%;padding:10px 12px;background:var(--bg);border:1px solid var(--border);border-radius:8px;
  font-size:14px;min-height:40px;color:var(--text);
}
.field textarea{min-height:72px;resize:vertical;font-family:inherit}
.field input:focus,.field select:focus,.field textarea:focus{border-color:var(--orange)}
.field-row{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.seg{display:flex;background:var(--bg);border-radius:8px;padding:3px;border:1px solid var(--border)}
.seg button{flex:1;padding:7px 10px;border-radius:6px;font-size:12.5px;font-weight:600;color:var(--text-2);min-height:32px}
.seg button.active{background:var(--card-hi);color:var(--text)}

/* ---------- STRENGTH ---------- */
.ex-card{background:var(--card);border-radius:12px;padding:14px}
.ex-name{font-size:14.5px;font-weight:600}
.ex-prescription{font-size:13px;color:var(--text-2);margin-top:6px;font-variant-numeric:tabular-nums}
.ex-tag{display:inline-block;font-size:10.5px;color:var(--text-3);margin-top:8px;padding:3px 8px;border-radius:6px;background:var(--bg);font-weight:500}
.ex-card.plyo{border:1px solid rgba(191,90,242,0.4)}
.ex-card.plyo .ex-tag{background:rgba(191,90,242,0.15);color:var(--purple)}

.evidence-banner{background:rgba(255,159,10,0.08);border:1px solid rgba(255,159,10,0.3);border-radius:12px;padding:14px 16px;margin-bottom:18px;font-size:12.5px;line-height:1.5;color:var(--text)}
.evidence-banner b{color:var(--orange)}

.ev-table{width:100%;border-collapse:collapse;font-size:12.5px}
.ev-table th,.ev-table td{text-align:left;padding:10px 8px;border-bottom:1px solid var(--border)}
.ev-table th{font-size:11px;color:var(--text-2);text-transform:uppercase;letter-spacing:0.04em;font-weight:600}
.ev-table td{color:var(--text-2)}
.ev-table td:first-child{color:var(--text);font-weight:500}

/* ---------- ZONES / WARNING ---------- */
.zone-card{padding:14px;border-radius:12px;border:1px solid}
.zone-card .zh{font-size:13px;font-weight:700;letter-spacing:-0.01em}
.zone-card .zhr{font-size:22px;font-weight:700;margin-top:4px;font-variant-numeric:tabular-nums;letter-spacing:-0.02em}
.zone-card .zd{font-size:12px;color:var(--text-2);margin-top:6px;line-height:1.45}
.zone-z1{border-color:rgba(48,209,88,0.4);background:rgba(48,209,88,0.06)}
.zone-z1 .zh{color:var(--green)}
.zone-z2{border-color:rgba(255,159,10,0.4);background:rgba(255,159,10,0.06)}
.zone-z2 .zh{color:var(--orange)}
.zone-z3{border-color:rgba(255,69,58,0.4);background:rgba(255,69,58,0.06)}
.zone-z3 .zh{color:var(--red)}
.warn-box{border:1px solid var(--orange);background:rgba(255,159,10,0.06);border-radius:12px;padding:14px 16px;font-size:13px;line-height:1.5}
.warn-box b{color:var(--orange)}

/* ---------- TABLES ---------- */
.tbl{width:100%;border-collapse:collapse;font-size:13px}
.tbl th,.tbl td{padding:11px 10px;text-align:left;border-bottom:1px solid var(--border)}
.tbl th{font-size:11px;color:var(--text-2);font-weight:600;text-transform:uppercase;letter-spacing:0.04em;background:var(--bg)}
.tbl tr:hover td{background:rgba(255,255,255,0.02)}
.tbl-wrap{overflow-x:auto;border-radius:12px;background:var(--card)}
.status-done{color:var(--green);font-weight:600}
.status-skipped{color:var(--text-3)}
.status-modified{color:var(--orange);font-weight:600}

/* readiness */
.read-row{display:flex;align-items:center;gap:10px;padding:8px 0;border-bottom:1px solid var(--border)}
.read-row:last-child{border-bottom:none}
.read-row label{flex:1;font-size:13px;color:var(--text-2)}
.stars{display:flex;gap:4px}
.star{width:24px;height:24px;border-radius:6px;background:var(--bg);display:flex;align-items:center;justify-content:center;color:var(--text-3);font-size:14px;font-weight:600}
.star.on{background:var(--orange);color:#000}

/* ---------- MOBILE ---------- */
.mobile-tabs{display:none}
@media(max-width:768px){
  #sidebar{display:none}
  #main{padding:16px;padding-top:calc(16px + var(--safe-t));padding-bottom:calc(72px + var(--safe-b))}
  .mobile-tabs{
    display:flex;position:fixed;bottom:0;left:0;right:0;
    background:#161618;border-top:1px solid var(--border);
    padding:8px 4px;padding-bottom:calc(8px + var(--safe-b));
    z-index:50;justify-content:space-around;
  }
  .mt-item{display:flex;flex-direction:column;align-items:center;gap:2px;padding:6px 8px;color:var(--text-3);font-size:10px;font-weight:600;min-width:54px}
  .mt-item.active{color:var(--orange)}
  .mt-item svg{width:20px;height:20px}
  .view-title{font-size:22px}
  .week-bar{flex-direction:column;align-items:stretch}
  .wk-label{min-width:0}
  .week-layout{grid-template-columns:1fr}
}

/* utility */
.hide{display:none!important}
.row{display:flex;gap:8px;align-items:center;flex-wrap:wrap}
.spacer{flex:1}
.muted{color:var(--text-2)}
.small{font-size:11.5px}
.mt-8{margin-top:8px}.mt-12{margin-top:12px}.mt-16{margin-top:16px}.mt-24{margin-top:24px}
.mb-8{margin-bottom:8px}.mb-12{margin-bottom:12px}.mb-16{margin-bottom:16px}.mb-24{margin-bottom:24px}
.text-center{text-align:center}
details>summary{cursor:pointer;list-style:none;font-weight:600;color:var(--text-2);font-size:12px;text-transform:uppercase;letter-spacing:0.04em;padding:6px 0}
details>summary::-webkit-details-marker{display:none}
details[open]>summary::after{content:" ↑"}
details:not([open])>summary::after{content:" ↓"}

.divider{height:1px;background:var(--border);margin:14px 0}
</style>
</head>
<body>

<!-- ============ APP ============ -->
<div id="app">

  <!-- ============ SIDEBAR ============ -->
  <aside id="sidebar">
    <div class="brand">
      <div class="avatar">J</div>
      <div class="brand-text">
        <div class="brand-name">James</div>
        <div class="brand-sub">Endurance Plan 2026</div>
      </div>
    </div>
    <nav class="nav" id="nav-list"></nav>
    <div class="countdown">
      <div class="countdown-num" id="cd-days">—</div>
      <div class="countdown-label">days to Fuji</div>
      <div class="progress"><div class="progress-fill" id="cd-progress"></div></div>
      <div class="countdown-meta" id="cd-meta">Week — / 32</div>
    </div>
  </aside>

  <!-- ============ MAIN ============ -->
  <main id="main">
    <div class="view" data-view="dashboard" id="view-dashboard"></div>
    <div class="view" data-view="weekly" id="view-weekly"></div>
    <div class="view" data-view="longrun" id="view-longrun"></div>
    <div class="view" data-view="strength" id="view-strength"></div>
    <div class="view" data-view="speed" id="view-speed"></div>
    <div class="view" data-view="profile" id="view-profile"></div>
    <div class="view" data-view="sideraces" id="view-sideraces"></div>
    <div class="view" data-view="raceweek" id="view-raceweek"></div>
    <div class="view" data-view="settings" id="view-settings"></div>
  </main>
</div>

<!-- ============ MOBILE TABS ============ -->
<nav class="mobile-tabs" id="mobile-tabs"></nav>

<!-- ============ MODAL ROOT ============ -->
<div id="modal-root"></div>

<script>
'use strict';

/* =========================================================================
   1. CONSTANTS — ATHLETE / PHASES / STORAGE
   ========================================================================= */

const ATHLETE = {
  name:"James",age:30,sex:"Male",weight:85,height:176,
  vo2max:55.1,hrMax:197,
  vt1_hr:155,vt1_speed:8.1,vt1_pace:"7:24",
  vt2_hr:171,vt2_speed:10.0,vt2_pace:"6:00",
  vvo2max:13.9,
  testDate:"4 April 2026",
  zones:{
    z1:{name:"Z1 — Aerobic Base",hrMax:154,color:"#30D158"},
    z2:{name:"Z2 — Threshold",hrMin:155,hrMax:171,color:"#FF9F0A"},
    z3:{name:"Z3 — VO₂max",hrMin:172,color:"#FF453A"}
  },
  race:{
    name:"Fuji Marathon",date:"2026-12-13",
    goal:"Sub 4:30:00",goalPace:"6:23/km",
    targetHR:"155–162 bpm",elevation:"240m gain",
    temp:"5–10°C",cutoff:"6:00:00"
  },
  planStart:"2026-05-04",
  totalWeeks:32
};

/* Secondary "fun" races — overlaid on main plan, no schedule changes */
const SECONDARY_RACES = [
  {
    id:"trail",name:"The North Face Trail 25k",short:"Trail 25k",
    date:"2026-06-28",color:"#30D158",icon:"🏔",
    weekInPlan:8,dayInPlan:6, // Sun of W8
    specs:{distance:"25 km",gain:"+1094 m",cutoff:"7:00:00",surface:"Trail / mountain",temp:"~28–32 °C (BKK summer)"},
    estimate:"4:30 – 5:00",
    impactNote:"Falls on W8 Sunday. W9 is already a recovery week → recovery cost absorbs naturally. No main-plan changes needed; Sat W8 hill-repeats serves as final tune-up."
  },
  {
    id:"hyrox",name:"Thai Hyrox · Doubles Men",short:"Hyrox",
    date:"2026-08-16",color:"#BF5AF2",icon:"💪",
    weekInPlan:15,dayInPlan:6,

/* =========================================================================
   3. DATE UTILITIES
   ========================================================================= */

const DAY_NAMES=["Mon","Tue","Wed","Thu","Fri","Sat","Sun"];
const DAY_NAMES_FULL=["Monday","Tuesday","Wednesday","Thursday","Friday","Saturday","Sunday"];
const MONTHS=["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"];

function parseISO(s){const[y,m,d]=s.split("-").map(Number);return new Date(y,m-1,d);}
function fmtISO(d){return d.getFullYear()+"-"+String(d.getMonth()+1).padStart(2,"0")+"-"+String(d.getDate()).padStart(2,"0");}
function addDays(d,n){const x=new Date(d);x.setDate(x.getDate()+n);return x;}
function fmtShort(d){return d.getDate()+" "+MONTHS[d.getMonth()];}
function fmtLong(d){return DAY_NAMES_FULL[(d.getDay()+6)%7]+", "+d.getDate()+" "+MONTHS[d.getMonth()]+" "+d.getFullYear();}

function dateForWeekDay(weekIndex,dayIndex){
  // weekIndex: 1..32, dayIndex: 0..6 (Mon..Sun)
  const start=parseISO(ATHLETE.planStart);
  return addDays(start,(weekIndex-1)*7+dayIndex);
}
function weekIndexForDate(d){
  const start=parseISO(ATHLETE.planStart);
  const diff=Math.floor((d-start)/(86400000));
  return Math.floor(diff/7)+1;
}
function todayISO(){return fmtISO(new Date());}
function daysUntil(iso){
  const t=new Date();t.setHours(0,0,0,0);
  return Math.ceil((parseISO(iso)-t)/86400000);
}

/* =========================================================================
   4. PLAN GENERATION
   ========================================================================= */

function phaseForWeek(w){
  for(const p of PHASES){if(w>=p.weeks[0]&&w<=p.weeks[1])return p;}
  return PHASES[3];
}

function isRecoveryWeek(w){return w%3===0 && w<28;} // recovery every 3rd, but not in taper
function isTuneRaceWeek(w){return w===26;} // half-marathon tune-up race
function isHillWeek(w){return [8,14,20].includes(w);} // hill repeats every ~6 weeks

function targetKmFor(w){
  const p=phaseForWeek(w);
  const len=p.weeks[1]-p.weeks[0];
  const wIn=w-p.weeks[0];
  let km=p.kmRange[0]+(p.kmRange[1]-p.kmRange[0])*(len?wIn/len:0);
  if(isRecoveryWeek(w))km*=0.7;
  if(isTuneRaceWeek(w))km*=0.85;
  return Math.round(km);
}

function longRunMinFor(w){
  let m;
  if(w<=8)        m=80+(w-1)*(30/7);              // 80→110
  else if(w<=18)  m=105+(w-9)*(40/9);             // 105→145
  else if(w<=27)  m=135+(w-19)*(25/8);            // 135→160
  else            m=150-(w-28)*(95/4);            // 150→55 taper
  if(isRecoveryWeek(w))m*=0.7;
  if(isTuneRaceWeek(w))m=110;                      // half-marathon race day
  return Math.min(180,Math.max(35,Math.round(m/5)*5));
}

function easyMinFor(w,longer){
  // longer=Tue (longer easy), false=Fri (shorter)
  let base;
  if(w<=8)        base=longer?40:32;
  else if(w<=18)  base=longer?48:38;
  else if(w<=27)  base=longer?55:42;
  else            base=longer?Math.max(30,55-(w-28)*5):Math.max(25,42-(w-28)*4);
  if(isRecoveryWeek(w))base=Math.round(base*0.75);
  return base;
}

function speedSessionFor(w){
  const ev='Polarized TID • Z2/Z3 dose (Muñoz 2014; Stöggl 2014)';
  if(isRecoveryWeek(w))
    return {type:"speed",title:"Easy fartlek (recovery wk)",detail:"4×1min pickup HR 160–168 / 2min easy • 35min total",duration:35,hrTarget:"160–168 / Z1 base",zone:"mixed",evidence:ev};

  if(w<=3)  return {type:"speed",title:"Fartlek 6×2min",detail:"6×2min @ HR 155–165 / 2min jog • 40min total",duration:40,hrTarget:"155–165",zone:"z2",evidence:ev};
  if(w<=6)  return {type:"speed",title:"Cruise intervals 4×5min",detail:"4×5min @ VT2 pace HR 165–171 / 3min jog",duration:45,hrTarget:"165–171",zone:"z2",evidence:ev};
  if(w<=8)  return {type:"speed",title:"Cruise intervals 5×5min",detail:"5×5min @ HR 165–171 / 3min jog",duration:50,hrTarget:"165–171",zone:"z2",evidence:ev};
  if(w<=12) return {type:"speed",title:"Tempo 2×10min",detail:"2×10min @ HR 160–168 / 5min jog",duration:50,hrTarget:"160–168",zone:"z2",evidence:ev};
  if(w<=15) return {type:"speed",title:"Threshold 3×8min",detail:"3×8min @ VT2 HR 168–171 / 4min jog",duration:55,hrTarget:"168–171",zone:"z2",evidence:ev};
  if(w<=18) return {type:"speed",title:"Threshold 4×7min",detail:"4×7min @ HR 168–172 / 3min jog",duration:60,hrTarget:"168–172",zone:"z2",evidence:ev};
  if(w<=22) return {type:"speed",title:"Marathon-pace tempo 3×12min",detail:"3×12min @ HR 155–162 (MP) / 3min jog • Practice race fueling",duration:60,hrTarget:"155–162",zone:"z2",evidence:ev};
  if(w<=25) return {type:"speed",title:"VO₂max 4×4min",detail:"4×4min @ Z3 HR >175 / 4min jog + 10min MP cooldown",duration:60,hrTarget:">175 then 155–162",zone:"z3",evidence:ev};
  if(w<=27) return {type:"speed",title:"Race sharpener 5×3min",detail:"5×3min @ Z3 / 3min jog",duration:50,hrTarget:">175",zone:"z3",evidence:ev};
  if(w<=30) return {type:"speed",title:"Easy fartlek 4×2min",detail:"4×2min pickup / 3min easy",duration:35,hrTarget:"165–172",zone:"mixed",evidence:ev};
  return       {type:"speed",title:"Sharpness 3×3min",detail:"3×3min @ Z3 / 3min jog • low volume taper sharpener",duration:30,hrTarget:">172",zone:"z3",evidence:ev};
}

function buildLongRun(w){
  const min=longRunMinFor(w);
  let detail,hrTarget,evidence;
  const ev1='Z1 long run • Maximize fat oxidation, suppress VLamax (Seiler 2010)';
  const ev2='Long run + MP segment • Race specificity (Stellingwerff 2018)';
  if(w<=8){
    detail=`Continuous Z1 • HR <150 throughout • target cadence 175–180 spm`;
    hrTarget="<150 (Z1)";evidence=ev1;
    return {type:"long_run",title:`Long run ${min}min`,detail,duration:min,hrTarget,zone:"z1",evidence:ev1};
  }
  if(w<=18){
    detail=`Z1 base + last 15min @ MP (HR 155–162) • Practice 30g CHO/hr fueling`;
    return {type:"mp_long",title:`Long run ${min}min + 15min MP`,detail,duration:min,hrTarget:"<150 / 155–162",zone:"z2",evidence:ev2};
  }
  if(w<=27){
    if(isTuneRaceWeek(w)){
      return {type:"tune_race",title:`Tune-up half marathon (race)`,detail:`Goal: ~3:08 (8:55/km avg). Race rehearsal — kit, fuel 60g/hr, warm-up routine. Reset INSCYD plan from result.`,duration:min,hrTarget:"165–171 race effort",zone:"z2",evidence:'Race rehearsal • Tune-up race -4 wk (Mujika 2010)'};
    }
    detail=`Z1 base + last 25min @ MP (HR 155–162) • Race fueling: 60g CHO/hr + 500ml fluid/hr`;
    return {type:"mp_long",title:`Long run ${min}min + 25min MP`,detail,duration:min,hrTarget:"<150 / 155–162",zone:"z2",evidence:ev2};
  }
  // Phase 4 taper long runs
  if(w===28||w===29) detail=`Z1 base + 20min MP • Maintain race-pace feel`;
  else if(w===30)    detail=`Easy Z1 long run • Reduce mileage, keep duration moderate`;
  else if(w===31)    detail=`Easy Z1 jog • Race shakeout`;
  else               detail=`RACE DAY — Fuji Marathon. Goal: Sub 4:30. Pace: 6:23/km. HR 155–162.`;
  return {type:w===32?"tune_race":"long_run",title:w===32?"🏁 RACE DAY — Fuji Marathon":`Long run ${min}min`,detail,duration:min,hrTarget:w===32?"155–162 (race)":"<150",zone:w===32?"z2":"z1",evidence:w===32?'Sub-4:30 = 6:23/km, HR 155–162':ev1};
}

function buildEasy(w,longer){
  const min=easyMinFor(w,longer);
  return {type:"easy_z1",title:`Easy run ${min}min`,detail:`Pure Z1 • HR <155 • Cadence target 175–180 spm • Nasal breathing if possible`,duration:min,hrTarget:"<155 (Z1)",zone:"z1",evidence:'Z1 volume drives mitochondrial density (Holloszy 1967; Seiler 2010)'};
}

function buildRecoveryRun(w){
  return {type:"recovery",title:"Recovery jog 25–30min",detail:"Very easy Z1 • HR <140 if possible • Active recovery, blood flow",duration:28,hrTarget:"<140",zone:"z1",evidence:'Active recovery flush (Reilly & Ekblom 2005)'};
}

function buildStrength(day,w){
  const phase=phaseForWeek(w);
  const isTaper=w>=28;
  const isRaceWk=w===32;
  if(isRaceWk)
    return {type:"rest",title:"Race week — no strength",detail:"Last heavy lift was D-10 to D-14. Full neuromuscular taper.",duration:0,hrTarget:"—",zone:"rest",evidence:'Strength taper • Last heavy ≥10d out (Ronnestad 2014)'};
  const setsNote = phase.short==="Base"?"60→80% 1RM • 3 sets":isTaper?"≥80% 1RM • 2 sets, ↓50% volume":"≥80% 1RM • 3–4 sets";
  if(day==="A")
    return {type:"strength_a",title:"Strength A — Squat / Bench / Row + Box jump",detail:`${setsNote} • +Plyo 3×5 box jump • ≥6h from run`,duration:55,hrTarget:"strength",zone:"strength",evidence:'HL+Plyo = sig. RE improvement (Llanos-Lagos 2024)'};
  return {type:"strength_b",title:"Strength B — Bulgarian SS / Hip thrust / OHP / Pull-up + Drop jump",detail:`${setsNote} • +Plyo 3×5 drop jump • ≥6h from run`,duration:55,hrTarget:"strength",zone:"strength",evidence:'HL+Plyo = sig. RE improvement (Llanos-Lagos 2024)'};
}

function buildHill(w){
  return {type:"hill",title:"Hill repeats 8×60s",detail:"8×60s strong uphill (≥6%) / jog down recovery + 15min Z1 CD • Specific to Fuji 240m gain",duration:60,hrTarget:"168–180",zone:"mixed",evidence:'Hill running improves RE (Barnes 2013) • Course specificity'};
}

function buildRest(){
  return {type:"rest",title:"Rest day",detail:"Full rest. Walking & mobility OK. Sleep 8h+, hydrate, eat at maintenance.",duration:0,hrTarget:"—",zone:"rest",evidence:'Recovery enables adaptation (Kellmann 2018)'};
}

function buildWeek(w){
  const days=[];
  const isRec=isRecoveryWeek(w);
  // Mon: Strength A (most weeks), recovery jog otherwise on recovery weeks
  if(isRec) days.push(buildRecoveryRun(w));
  else      days.push(buildStrength("A",w));
  // Tue: Easy Z1 (longer)
  days.push(buildEasy(w,true));
  // Wed: Speed
  days.push(speedSessionFor(w));
  // Thu: Strength B (or easy on recovery weeks)
  if(isRec) days.push(buildEasy(w,false));
  else      days.push(buildStrength("B",w));
  // Fri: Easy Z1 (shorter) — or rest before tune-race
  if(isTuneRaceWeek(w)) days.push(buildRest());
  else                   days.push(buildEasy(w,false));
  // Sat: Long run / Hill / Race
  if(isHillWeek(w))      days.push(buildHill(w));
  else                    days.push(buildLongRun(w));
  // Sun: Recovery jog or rest
  if(w===32) days.push(buildRest()); // post-race
  else if(isRec) days.push(buildRest());
  else            days.push(buildRecoveryRun(w));

  // override for tune-race week: shift long run → Sun? Keep on Sat for race day fit.
  // race week (32): override
  if(w===32){
    return {weekNum:w,phase:phaseForWeek(w),isRecovery:false,targetKm:targetKmFor(w),days:[
      buildEasy(w,false),                                                                                      // Mon
      {type:"easy_z1",title:"Easy run 30min + 4×100m strides",detail:"Z1 + 4×100m strides on flat • Activate nervous system",duration:30,hrTarget:"<155",zone:"z1",evidence:'Pre-race priming (Mujika 2003)'},
      buildRest(),                                                                                              // Wed
      {type:"easy_z1",title:"Easy jog 20min + 3×100m strides",detail:"Easy shakeout • Stay loose",duration:20,hrTarget:"<150",zone:"z1",evidence:'Pre-race shakeout'},
      buildRest(),                                                                                              // Fri — full rest, carb load
      {type:"easy_z1",title:"Race-day shakeout 15min",detail:"Race tomorrow! Easy 15min + 2 strides. Carb load complete.",duration:15,hrTarget:"<140",zone:"z1",evidence:'Race-eve activation'},
      {type:"tune_race",title:"🏁 FUJI MARATHON — RACE DAY",detail:"Sub 4:30 goal • 6:23/km avg • HR 155–162. Fuel 60–90g CHO/hr + 500–700ml fluid/hr. Start conservative — pace, not place.",duration:270,hrTarget:"155–162 → 165 final",zone:"z2",evidence:'Race execution per plan'}
    ]};
  }
  return {weekNum:w,phase:phaseForWeek(w),isRecovery:isRec,targetKm:targetKmFor(w),days};
}

const PLAN = (function(){const p=[];for(let w=1;w<=ATHLETE.totalWeeks;w++)p.push(buildWeek(w));return p;})();

function renderWeekly(){
  const w=State.currentWeek;
  const week=PLAN[w-1];
  const phase=week.phase;
  const startDate=dateForWeekDay(w,0);
  const endDate=dateForWeekDay(w,6);
  const todayStr=todayISO();
  const log=Store.get(STORAGE.sessions,{});

  // metrics
  let kmLogged=0,sessionsDone=0,sessionsModified=0,hrSum=0,hrCount=0;
  let z1Min=0,z2Min=0,z3Min=0;
  for(let d=0;d<7;d++){
    const date=fmtISO(dateForWeekDay(w,d));
    const lg=log[date];
    if(lg){
      if(lg.status==="done"||lg.status==="modified"){
        sessionsDone++;
        if(lg.actualDistance)kmLogged+=parseFloat(lg.actualDistance)||0;
        if(lg.avgHR){hrSum+=parseInt(lg.avgHR);hrCount++;}
        const dur=parseInt(lg.actualDuration)||week.days[d].duration||0;
        if(week.days[d].zone==="z1")z1Min+=dur;
        else if(week.days[d].zone==="z2")z2Min+=dur;
        else if(week.days[d].zone==="z3")z3Min+=dur;
        else if(week.days[d].zone==="mixed"){z1Min+=dur*0.5;z2Min+=dur*0.4;z3Min+=dur*0.1;}
      }
      if(lg.status==="modified")sessionsModified++;
    }
  }
  const totalMin=z1Min+z2Min+z3Min;
  const z1Pct=totalMin?Math.round(z1Min/totalMin*100):0;
  const z2Pct=totalMin?Math.round(z2Min/totalMin*100):0;
  const z3Pct=totalMin?Math.round(z3Min/totalMin*100):0;

  // Day rows
  const dayRows=week.days.map((s,d)=>{
    const date=fmtISO(dateForWeekDay(w,d));
    const dateObj=dateForWeekDay(w,d);
    const lg=log[date]||{};
    const isToday=date===todayStr;

          <button class="checkbox ${isDone?"done":""} ${isSkipped?"skipped":""}" title="Mark done">${iconCheck()}</button>

  document.getElementById("view-weekly").innerHTML=`
    <div class="view-head">
      <div>

        <div class="view-sub">Phase ${PHASES.indexOf(phase)+1} of 4 · ${phase.focus}</div>

    <div class="week-bar">
      <div class="week-nav">
        <button class="wk-arrow" id="wk-prev">${iconLeft()}</button>

        <button class="wk-arrow" id="wk-next">${iconRight()}</button>
      </div>
      <div class="row">
        <span class="chip" style="background:${phase.color}33;color:${phase.color}">${phase.name}</span>
        <span class="chip">${week.targetKm} km target</span>
        <span class="chip">${week.days.filter(d=>d.type!=="rest").length} sessions</span>
        ${week.isRecovery?'<span class="chip chip-green">Recovery week</span>':""}
        ${isTuneRaceWeek(w)?'<span class="chip chip-orange">Tune-up race</span>':""}
        ${w===32?'<span class="chip chip-red">RACE WEEK</span>':""}
      </div>
    </div>

    <div class="grid grid-4 mb-16">
      <div class="metric card"><div class="metric-label">km logged</div><div class="metric-value">${kmLogged.toFixed(1)}</div><div class="metric-sub">/ ${week.targetKm} km target</div></div>
      <div class="metric card"><div class="metric-label">Sessions done</div><div class="metric-value">${sessionsDone}</div><div class="metric-sub">/ ${week.days.filter(d=>d.type!=="rest").length} planned</div></div>
      <div class="metric card"><div class="metric-label">Modified</div><div class="metric-value">${sessionsModified}</div><div class="metric-sub">vs plan</div></div>
      <div class="metric card"><div class="metric-label">Avg HR (logged)</div><div class="metric-value">${hrCount?Math.round(hrSum/hrCount):"—"}</div><div class="metric-sub">${hrCount} sessions</div></div>
    </div>

    <div class="week-layout">
      <div>${dayRows}</div>
      <aside>
        <div class="card mb-12">
          <div class="card-h">TID Distribution (logged)</div>
          ${tidBar("Z1",z1Pct,phase.tid[0],"#30D158")}
          ${tidBar("Z2",z2Pct,phase.tid[1],"#FF9F0A")}
          ${tidBar("Z3",z3Pct,phase.tid[2],"#FF453A")}
          <div class="small muted mt-8">Bars=actual · markers=phase target</div>
        </div>
        <div class="card mb-12">

          <div style="font-size:24px;font-weight:700;font-variant-numeric:tabular-nums;letter-spacing:-0.02em">${kmLogged.toFixed(1)}<span style="color:var(--text-2);font-size:14px;font-weight:500"> / ${week.targetKm} km</span></div>
          <div class="progress mt-8"><div class="progress-fill" style="width:${Math.min(100,kmLogged/week.targetKm*100)}%"></div></div>
        </div>
        <div class="card mb-12">

          <div style="font-size:15px;font-weight:600;color:${phase.color}">${phase.name}</div>

          <div class="small muted mt-8">${phase.focus}</div>

  // Wire up events
  document.getElementById("wk-prev").addEventListener("click",()=>{if(State.currentWeek>1){State.currentWeek--;renderWeekly();}});
  document.getElementById("wk-next").addEventListener("click",()=>{if(State.currentWeek<32){State.currentWeek++;renderWeekly();}});
  document.getElementById("btn-today-jump").addEventListener("click",()=>{
    const wi=weekIndexForDate(new Date());
    if(wi>=1&&wi<=32){State.currentWeek=wi;renderWeekly();}
  });
  document.getElementById("btn-log-session").addEventListener("click",()=>{
    const today=todayISO();
    const wi=weekIndexForDate(new Date());

function tidBar(label,actual,target,color){
  return `<div class="tid-row">
    <div class="tid-head"><span class="label">${label}</span><span class="pct">${actual}% <span style="color:var(--text-3)">/ ${target}%</span></span></div>
    <div class="tid-track">
      <div class="tid-fill" style="width:${actual}%;background:${color}"></div>
      <div class="tid-target" style="left:${target}%"></div>
    </div>
  </div>`;
}

function nextMilestone(w){
  // Next recovery, next phase, INSCYD retest, race
  const items=[];
  for(let i=w+1;i<=32;i++){if(isRecoveryWeek(i)){items.push({d:i-w,t:`Recovery week (W${i})`});break;}}
  const ph=phaseForWeek(w);
  if(ph.weeks[1]<32) items.push({d:ph.weeks[1]-w+1,t:`Next phase: ${PHASES[PHASES.indexOf(ph)+1].name} (W${ph.weeks[1]+1})`});
  if(w<26) items.push({d:26-w,t:"Tune-up half marathon (W26)"});
  if(w<22) items.push({d:22-w,t:"INSCYD retest window (W22)"});
  items.push({d:32-w,t:"🏁 Fuji Marathon (W32)"});
  items.sort((a,b)=>a.d-b.d);
  return items.slice(0,3).map(i=>`<div style="padding:6px 0;border-bottom:1px solid var(--border);font-size:12.5px"><b style="color:var(--orange)">${i.d}wk</b> · ${i.t}</div>`).join("");
}

function toggleDone(date,wIdx,dIdx){
  const lg=getSessionLog(date)||{};
  const session=PLAN[wIdx-1].days[dIdx];
  if(lg.status==="done"||lg.status==="modified"){
    deleteSessionLog(date);
  } else {
    saveSessionLog(date,{
      status:"done",
      type:session.type,
      title:session.title,
      actualDuration:session.duration,
      timestamp:Date.now()
    });
  }
  renderWeekly();renderCountdown();
}

function renderDashboard(){
  const days=daysUntil(ATHLETE.race.date);
  const log=Store.get(STORAGE.sessions,{});
  const today=new Date();today.setHours(0,0,0,0);
  const wIdx=Math.max(1,Math.min(32,weekIndexForDate(today)));

  // Total km logged
  let totalKm=0,totalPlanned=0;
  for(let w=1;w<=32;w++){totalPlanned+=PLAN[w-1].targetKm;}
  Object.values(log).forEach(l=>{if((l.status==="done"||l.status==="modified")&&l.actualDistance)totalKm+=parseFloat(l.actualDistance)||0;});

  // Avg Z1% last 4 weeks
  let z1=0,z2=0,z3=0;
  for(let w=Math.max(1,wIdx-3);w<=wIdx;w++){
    for(let d=0;d<7;d++){
      const date=fmtISO(dateForWeekDay(w,d));
      const lg=log[date];if(!lg)continue;
      if(lg.status!=="done"&&lg.status!=="modified")continue;
      const dur=parseInt(lg.actualDuration)||PLAN[w-1].days[d].duration||0;
      const z=PLAN[w-1].days[d].zone;
      if(z==="z1")z1+=dur;else if(z==="z2")z2+=dur;else if(z==="z3")z3+=dur;
      else if(z==="mixed"){z1+=dur*0.5;z2+=dur*0.4;z3+=dur*0.1;}
    }
  }
  const tot=z1+z2+z3;
  const z1Pct=tot?Math.round(z1/tot*100):0;

  // Current week volume
  let curKm=0;
  for(let d=0;d<7;d++){const date=fmtISO(dateForWeekDay(wIdx,d));const lg=log[date];if(lg&&lg.actualDistance)curKm+=parseFloat(lg.actualDistance)||0;}
  const curTarget=PLAN[wIdx-1].targetKm;

  // ACWR (Acute:Chronic Workload Ratio) — Gabbett 2016
  const acwr=computeACWR(log,wIdx);

  // current week sessions
  const curWeek=PLAN[wIdx-1];
  const todayStr=todayISO();

      ${SECONDARY_RACES.map(r=>{

      </div>
      <div class="card">
        <div class="card-h">Next Key Session</div>
        ${nextKey?`
          <div style="font-size:14px;font-weight:600">${nextKey.session.title}</div>
          <div class="small muted mt-8">${fmtLong(parseISO(nextKey.date))}</div>
          <div class="small mt-12">${nextKey.session.detail}</div>
          <div class="row mt-12">
            <span class="chip">⏱ ${nextKey.session.duration}min</span>
            <span class="chip">♥ ${nextKey.session.hrTarget}</span>
          </div>
          ${nextKey.session.evidence?`<div class="day-evidence mt-12">📚 ${nextKey.session.evidence}</div>`:""}
        `:`<div class="muted">No upcoming key session.</div>`}
      </div>
      <div class="card">

      </div>
    </div>

    <div class="card mt-16">
      <div class="card-h">Daily Readiness — ${fmtLong(new Date())}</div>
      ${renderReadinessForm()}
    </div>
  `;

  drawVolumeChart(wIdx,log);
  attachReadinessHandlers();
}

function computeACWR(log,wIdx){
  // Acute = total minutes last 7 days. Chronic = avg total min/wk over last 28d (4 wk).
  const today=new Date();today.setHours(0,0,0,0);
  let acute=0,chronic=0;
  for(let i=0;i<28;i++){
    const d=addDays(today,-i);
    const date=fmtISO(d);
    const lg=log[date];
    if(!lg)continue;
    if(lg.status!=="done"&&lg.status!=="modified")continue;
    const wi=weekIndexForDate(d);
    const dow=(d.getDay()+6)%7;
    const dur=parseInt(lg.actualDuration)||(PLAN[wi-1]?PLAN[wi-1].days[dow]?.duration:0)||0;
    if(i<7)acute+=dur;
    chronic+=dur;
  }
  chronic=chronic/4; // average per week
  const ratio=chronic>0?(acute/chronic):0;
  let zone="No data",color="var(--text-2)";
  if(chronic===0){zone="Building baseline";color="var(--text-2)";}
  else if(ratio<0.8){zone="Detraining risk";color="var(--blue)";}
  else if(ratio<=1.3){zone="Sweet spot ✓";color="var(--green)";}
  else if(ratio<=1.5){zone="Caution";color="var(--orange)";}
  else{zone="Injury risk ⚠";color="var(--red)";}
  return {ratio:ratio.toFixed(2),zone,color,acute:Math.round(acute),chronic:Math.round(chronic)};
}

let volumeChart=null;
function drawVolumeChart(wIdx,log){
  const ctx=document.getElementById("ch-volume");
  if(!ctx)return;
  const labels=[],planned=[],logged=[];
  const start=Math.max(1,wIdx-7);
  const end=Math.min(32,wIdx+4);
  for(let w=start;w<=end;w++){
    labels.push("W"+w);
    planned.push(PLAN[w-1].targetKm);
    let km=0;
    for(let d=0;d<7;d++){const date=fmtISO(dateForWeekDay(w,d));const lg=log[date];if(lg&&lg.actualDistance)km+=parseFloat(lg.actualDistance)||0;}
    logged.push(km);
  }
  if(volumeChart)volumeChart.destroy();
  volumeChart=new Chart(ctx,{
    type:"bar",
    data:{
      labels,
      datasets:[
        {label:"Planned km",data:planned,backgroundColor:"rgba(255,159,10,0.15)",borderColor:"rgba(255,159,10,0.4)",borderWidth:1,borderSkipped:false,borderRadius:4},
        {label:"Logged km",data:logged,backgroundColor:"#FF9F0A",borderRadius:4}
      ]
    },
    options:{
      responsive:true,maintainAspectRatio:false,
      plugins:{legend:{labels:{color:"#8E8E93",font:{size:11}}}},
      scales:{
        x:{grid:{color:"#3A3A3C"},ticks:{color:"#8E8E93",font:{size:10}}},
        y:{grid:{color:"#3A3A3C"},ticks:{color:"#8E8E93",font:{size:10}}}

    }
  });
}

/* =========================================================================
   19. SETTINGS VIEW
   ========================================================================= */
function renderSettings(){
  document.getElementById("view-settings").innerHTML=`
    <div class="view-head"><div><div class="view-title">Settings</div><div class="view-sub">Backup, restore, and reset</div></div></div>

    <div class="card mb-16">
      <div class="card-h">Plan Configuration</div>
      <div class="field-row mt-12">
        <div class="field"><label>Athlete</label><input value="${ATHLETE.name}" disabled></div>
        <div class="field"><label>Race date</label><input value="${ATHLETE.race.date}" disabled></div>
      </div>
      <div class="field-row">
        <div class="field"><label>Plan start</label><input value="${ATHLETE.planStart}" disabled></div>
        <div class="field"><label>Total weeks</label><input value="${ATHLETE.totalWeeks}" disabled></div>
      </div>
      <div class="small muted">To change athlete data, edit the <code>ATHLETE</code> constant at the top of the script.</div>
    </div>

    <div class="card mb-16">
      <div class="card-h">Backup / Restore</div>
      <div class="row mt-12">
        <button class="btn btn-primary" id="btn-export">Export all data (JSON)</button>
        <button class="btn" id="btn-import">Import from JSON</button>
      </div>
      <div class="small muted mt-12">Export downloads a JSON snapshot of all sessions, strength logs, and readiness. Save it as a backup or transfer to another device.</div>
    </div>

    <div class="card mb-16">
      <div class="card-h">Storage Stats</div>
      ${(()=>{
        const sess=Object.keys(Store.get(STORAGE.sessions,{})).length;
        const str=(Store.get(STORAGE.strength,[])||[]).length;
        const re=Object.keys(Store.get(STORAGE.readiness,{})).length;
        return `
          <div class="grid grid-3 mt-12">
            <div class="metric"><div class="metric-label">Sessions logged</div><div class="metric-value">${sess}</div></div>
            <div class="metric"><div class="metric-label">Strength logs</div><div class="metric-value">${str}</div></div>
            <div class="metric"><div class="metric-label">Readiness entries</div><div class="metric-value">${re}</div></div>
          </div>`;
      })()}
    </div>

    <div class="card">
      <div class="card-h" style="color:var(--red)">Danger Zone</div>
      <div class="row mt-12">
        <button class="btn" id="btn-clear-sess">Clear session log</button>
        <button class="btn" id="btn-clear-strength">Clear strength log</button>
        <button class="btn" id="btn-clear-all" style="background:rgba(255,69,58,0.15);color:var(--red)">Clear EVERYTHING</button>
      </div>
    </div>
  `;
  document.getElementById("btn-export").addEventListener("click",()=>{
    const data=Store.exportAll();
    const blob=new Blob([JSON.stringify(data,null,2)],{type:"application/json"});
    const url=URL.createObjectURL(blob);
    const a=document.createElement("a");
    a.href=url;a.download=`fuji-backup-${todayISO()}.json`;a.click();
    URL.revokeObjectURL(url);
  });
  document.getElementById("btn-import").addEventListener("click",()=>{
    const inp=document.createElement("input");
    inp.type="file";inp.accept="application/json";
    inp.onchange=e=>{
      const f=e.target.files[0];if(!f)return;
      const r=new FileReader();
      r.onload=ev=>{
        try{const obj=JSON.parse(ev.target.result);Store.importAll(obj);flash("Imported successfully");renderSettings();}
        catch(err){alert("Invalid JSON file");}
      };r.readAsText(f);
    };inp.click();
  });
  document.getElementById("btn-clear-sess").addEventListener("click",()=>{if(confirm("Clear all session logs?")){Store.clear(STORAGE.sessions);renderSettings();}});
  document.getElementById("btn-clear-strength").addEventListener("click",()=>{if(confirm("Clear all strength logs?")){Store.clear(STORAGE.strength);renderSettings();}});
  document.getElementById("btn-clear-all").addEventListener("click",()=>{
    if(confirm("⚠ This will delete ALL data permanently. Continue?")){
      for(const k in STORAGE)Store.clear(STORAGE[k]);
      renderSettings();flash("All data cleared");
    }
  });
}

/* =========================================================================
   20. UTILITIES
   ========================================================================= */
function escapeHtml(s){return String(s||"").replace(/[&<>"']/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"})[c]);}
function flash(msg){
  const f=document.createElement("div");
  f.textContent=msg;
  f.style.cssText="position:fixed;bottom:80px;left:50%;transform:translateX(-50%);background:#2C2C2E;color:#fff;padding:10px 18px;border-radius:24px;border:1px solid #3A3A3C;z-index:200;font-size:13px;font-weight:600;box-shadow:0 4px 16px rgba(0,0,0,0.4)";
  document.body.appendChild(f);
  setTimeout(()=>f.remove(),1800);
}

function init(){
  State.init();
  renderNav();
  renderCountdown();

  if(!Store.get("fuji_first_run",false)){
    showWelcome();
    Store.set("fuji_first_run",true);

  switchView("weekly");
  // Recompute countdown daily
  setInterval(renderCountdown,3600000);
}
